name: Bug Report
description: Report incorrect behavior or a regression.
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Commands, minimal script, Ruby / Polyrun version.
      placeholder: |
        Ruby version:
        Polyrun version:
        Steps:
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, CI link, relevant config.
