name: test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: RSpec
        run: bundle exec polyrun parallel-rspec --workers 5 --merge-failures

      - name: RuboCop
        run: bundle exec rubocop

      - name: RBS
        run: bundle exec rake rbs

  appraisal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - appraisal: ruby34
            ruby: "3.4"
          - appraisal: ruby40
            ruby: "4.0"

    env:
      BUNDLE_GEMFILE: >-
        ${{ github.workspace }}/gemfiles/${{ matrix.appraisal }}.gemfile

    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          cache-version: appraisal-${{ matrix.appraisal }}

      - name: RSpec (Appraisal)
        run: bundle exec polyrun parallel-rspec --workers 5 --merge-failures
