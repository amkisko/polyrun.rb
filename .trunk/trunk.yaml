# https://docs.trunk.io/cli
version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.4
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.10.8
    - ruby@>=3.3.0
lint:
  disabled:
    - brakeman
    - rufo
    - eslint
    - prettier
    - standardrb
    - semgrep
    - oxipng
    - svgo
    - trufflehog
    - shfmt
    - hadolint
    - trivy
  definitions:
    - name: stylelint
      files: [css]
    - name: rubocop
      extra_packages:
        - standard@1.52.0
        - standard-custom@1.0.2
        - standard-performance@1.8.0
        - rubocop-rspec@3.8.0
        - rubocop-thread_safety@0.7.3
  ignore:
    - linters: [ALL]
      paths:
        - bin/**
        - benchmark/**
        - examples/**
        - vendor/**
        - tmp/**
        - log/**
        - coverage/**
        - gemfiles/**
  enabled:
    - biome@2.3.8
    - rubocop@1.81.7
    - stylelint@16.26.1
    - yamllint@1.37.1
    - gitleaks@8.29.0
    - actionlint@1.7.8
    - checkov@3.2.495
    - dotenv-linter@4.0.0
    - git-diff-check
    - markdownlint@0.46.0
    - osv-scanner@2.2.4
    - shellcheck@0.11.0
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
