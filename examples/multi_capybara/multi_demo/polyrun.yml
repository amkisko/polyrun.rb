# Polyrun: dual Vite roots + partition / prepare / shard DB pattern (PostgreSQL names for polyrun env).
partition:
  paths_file: spec/paths.txt
  shard_total: 4
  shard_index: 0

prepare:
  recipe: default
  rails_root: .

databases:
  template_db: simple_demo_template
  shard_db_pattern: "multi_capybara_test_%{shard}"
  postgresql:
    host: localhost
    username: postgres
