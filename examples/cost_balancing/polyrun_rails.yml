# Use from the Rails app directory: `cd rails_demo` (symlink to ../multi_database/multi_demo).
# Timing file lives in this folder; path is relative to the Rails app cwd.
partition:
  paths_file: spec/paths.txt
  strategy: cost_binpack
  timing_file: ../../cost_balancing/polyrun_timing.json
  shard_total: 4
  shard_index: 0

prepare:
  recipe: default
  rails_root: .

databases:
  template_db: multi_demo_template
  shard_db_pattern: "multi_demo_test_%{shard}"
  postgresql:
    host: localhost
    # port: use PGPORT when using examples/docker-compose.yml
    username: postgres
