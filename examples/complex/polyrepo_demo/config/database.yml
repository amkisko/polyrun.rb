# Multi-database example: primary (app) + cache (separate SQLite files).
# See https://guides.rubyonrails.org/active_record_multiple_databases.html
default: &default
  adapter: sqlite3
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
  warehouse:
    <<: *default
    database: storage/development_warehouse.sqlite3
    migrations_paths: db/warehouse_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate
  warehouse:
    <<: *default
    database: storage/test_warehouse.sqlite3
    migrations_paths: db/warehouse_migrate

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  warehouse:
    <<: *default
    database: storage/production_warehouse.sqlite3
    migrations_paths: db/warehouse_migrate
